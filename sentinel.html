<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Geovisor Sentinel-2 Uruguay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 90vh; }
    #controls { padding: 10px; }
  </style>
</head>
<body>
  <div id="controls">
    <label for="date">Selecciona fecha:</label>
    <input type="date" id="date" value="2026-06-15">
    <button id="update">Actualizar Sentinel-2</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Crear mapa centrado en Montevideo
    var map = L.map('map').setView([-34.9, -56.2], 10);

    // Capa base OSM
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // URL base correcta de Copernicus Data Space
    var wmsUrl = "https://sh.dataspace.copernicus.eu/ogc/wms/501abacf-205b-485b-b8ba-6e2651b95f0e";

    // Sentinel Hub - NATURAL COLOR (true color)
    var trueColor = L.tileLayer.wms(wmsUrl, {
        layers: "NATURAL-COLOR",
        format: "image/jpeg",
        attribution: "Copernicus Data Space / Sentinel Hub",
        maxZoom: 20,
        time: "2026-06-15"
    }).addTo(map);

    // Sentinel Hub - NDVI
    var ndvi = L.tileLayer.wms(wmsUrl, {
        layers: "VEGETATION_INDEX",
        format: "image/jpeg",
        attribution: "Copernicus Data Space / Sentinel Hub",
        maxZoom: 20,
        time: "2026-06-15"
    });

    // Sentinel Hub - Falso color urbano
    var falseUrban = L.tileLayer.wms(wmsUrl, {
        layers: "COLOR_INFRARED__URBAN_",
        format: "image/jpeg",
        attribution: "Copernicus Data Space / Sentinel Hub",
        maxZoom: 20,
        time: "2026-06-15"
    });

    // Control de capas
    L.control.layers({
        "OSM": osm,
        "Color natural": trueColor,
        "NDVI": ndvi,
        "Falso color urbano": falseUrban
    }).addTo(map);

    // Función para actualizar fecha en todas las capas
    document.getElementById("update").onclick = function() {
      var date = document.getElementById("date").value;
      if (date) {
        trueColor.setParams({time: date});
        ndvi.setParams({time: date});
        falseUrban.setParams({time: date});
      }
    };
  </script>
</body>
</html>
